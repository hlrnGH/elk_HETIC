# Pipeline TMDB
# Lit le CSV une seule fois et alimente deux index :
#   - movies_raw   : données brutes
#   - movies_clean : données typées et nettoyées
# On clone chaque event : l'original part dans raw, le clone est transformé puis part dans clean.

input {
  file {
    path                    => "/data/archive/tmdb_5000_movies.csv"
    start_position          => "beginning"
    sincedb_path            => "/dev/null"
    mode                    => "read"
    file_completed_action   => "log"
    file_completed_log_path => "/dev/null"
  }
}

filter {

  # Découpage de chaque ligne du CSV en colonnes nommées
  csv {
    separator   => ","
    skip_header => true
    columns     => [
      "budget", "genres", "homepage", "id", "keywords",
      "original_language", "original_title", "overview", "popularity",
      "production_companies", "production_countries", "release_date",
      "revenue", "runtime", "spoken_languages", "status",
      "tagline", "title", "vote_average", "vote_count"
    ]
  }

  # On jette la ligne d'en-tête si elle passe, et les lignes sans id
  if [budget] == "budget" { drop {} }
  if ![id] or [id] == "" { drop {} }

  # Duplication de l'event. Le clone reçoit un tag pour qu'on puisse le reconnaître.
  # J'utilise un tag plutôt que le champ [type] parce qu'ES 8 l'ignore
  # (voir le warning dans les logs Logstash).
  clone {
    clones  => ["clean"]
    add_tag => ["cleaned"]
  }

  # Transformations appliquées seulement au clone
  if "cleaned" in [tags] {

    # Conversion des colonnes numériques (elles arrivent en string depuis le CSV)
    mutate {
      convert => {
        "budget"       => "integer"
        "id"           => "integer"
        "revenue"      => "integer"
        "runtime"      => "integer"
        "vote_count"   => "integer"
        "popularity"   => "float"
        "vote_average" => "float"
      }
    }

    # Parsing de la date au format yyyy-MM-dd
    date {
      match    => ["release_date", "yyyy-MM-dd"]
      target   => "release_date"
      timezone => "UTC"
    }

    # Les champs comme "genres" arrivent sous forme de string JSON :
    #   [{"id": 28, "name": "Action"}, {"id": 12, "name": "Adventure"}]
    # On parse le JSON et on garde juste les "name" → ["Action", "Adventure"]
    ruby {
      code => '
        require "json"
        ["genres", "keywords", "production_companies",
         "production_countries", "spoken_languages"].each do |field|
          raw = event.get(field)
          next if raw.nil? || raw.to_s.strip.empty?
          begin
            parsed = JSON.parse(raw)
            event.set(field, parsed.map { |item| item["name"] }.compact)
          rescue JSON::ParserError
          end
        end
      '
    }
  }

  # Suppression des champs internes Logstash dont on n'a pas besoin
  mutate {
    remove_field => ["@timestamp", "@version", "event", "host", "log", "message"]
  }
}

output {

  # Routage vers l'index selon le tag
  if "cleaned" in [tags] {
    elasticsearch {
      hosts       => ["http://elasticsearch:9200"]
      index       => "movies_clean"
      document_id => "%{id}"
    }
  } else {
    elasticsearch {
      hosts       => ["http://elasticsearch:9200"]
      index       => "movies_raw"
      document_id => "%{id}"
    }
  }

  stdout { codec => dots }
}