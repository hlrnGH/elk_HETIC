<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movies Search</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f5f5;
    font-family: 'Source Sans Pro', 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  .sidebar {
    position: fixed;
    top: 0; left: 0;
    width: 260px;
    height: 100vh;
    background: #fff;
    border-right: 1px solid #e0e0e0;
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .sidebar-logo {
    font-size: 1.3rem;
    font-weight: 700;
    color: #ff4b4b;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sidebar label {
    font-size: 0.8rem;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: block;
    margin-bottom: 6px;
  }

  .sidebar select {
    width: 100%;
    background: #fafafa;
    border: 1px solid #ddd;
    color: #333;
    font-size: 0.9rem;
    padding: 8px 10px;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .sidebar select:focus { border-color: #ff4b4b; }

  .sidebar-section {
    border-top: 1px solid #f0f0f0;
    padding-top: 1.5rem;
  }

  .sidebar-stat { font-size: 0.82rem; color: #888; margin-top: 0.4rem; }
  .sidebar-stat strong { color: #ff4b4b; }

  .main {
    margin-left: 260px;
    padding: 2.5rem 3rem;
    max-width: 1100px;
  }

  .main h1 { font-size: 2.2rem; font-weight: 700; color: #1a1a1a; margin-bottom: 0.3rem; }
  .main h1 span { color: #ff4b4b; }
  .main p.subtitle { color: #888; font-size: 0.95rem; margin-bottom: 2rem; }

  .search-wrapper { position: relative; margin-bottom: 1.5rem; }

  .search-wrapper input {
    width: 100%;
    background: #fff;
    border: 2px solid #e0e0e0;
    color: #1a1a1a;
    font-size: 1.1rem;
    padding: 1rem 1.25rem 1rem 3rem;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .search-wrapper input:focus {
    border-color: #ff4b4b;
    box-shadow: 0 0 0 3px rgba(255,75,75,0.1);
  }

  .search-wrapper input::placeholder { color: #bbb; }
  .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #bbb; font-size: 1.1rem; }

  .meta { color: #888; font-size: 0.88rem; margin-bottom: 1.5rem; min-height: 1.2em; }
  .meta strong { color: #ff4b4b; }

  .results { display: flex; flex-direction: column; gap: 0.75rem; }

  .card {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.4rem 1rem;
    transition: box-shadow 0.2s, border-color 0.2s;
  }

  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); border-color: #ff4b4b; }

  .card-title { font-size: 1.05rem; font-weight: 700; color: #1a1a1a; }
  .card-score { font-size: 1rem; font-weight: 700; color: #ff4b4b; white-space: nowrap; }

  .card-meta {
    font-size: 0.82rem; color: #999;
    display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center;
  }

  .badge {
    display: inline-block;
    background: #fff0f0; color: #ff4b4b;
    font-size: 0.75rem; font-weight: 600;
    padding: 2px 10px; border-radius: 20px;
    border: 1px solid #ffd0d0;
  }

  .card-overview {
    grid-column: 1 / -1;
    font-size: 0.88rem; color: #777; line-height: 1.6; margin-top: 0.3rem;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }

  .empty { text-align: center; color: #bbb; padding: 5rem 0; font-size: 1rem; }
  .empty span { font-size: 2.5rem; display: block; margin-bottom: 1rem; }
  .loading { text-align: center; color: #bbb; padding: 3rem 0; font-size: 0.95rem; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">🎬 Movies ELK</div>

  <div>
    <label>Genre</label>
    <select id="genre" onchange="search()">
      <option value="">Tous les genres</option>
      <option>Action</option><option>Adventure</option><option>Animation</option>
      <option>Comedy</option><option>Crime</option><option>Documentary</option>
      <option>Drama</option><option>Family</option><option>Fantasy</option>
      <option>History</option><option>Horror</option><option>Music</option>
      <option>Mystery</option><option>Romance</option><option>Science Fiction</option>
      <option>Thriller</option><option>War</option><option>Western</option>
    </select>
  </div>

  <div>
    <label>Langue</label>
    <select id="language" onchange="search()">
      <option value="">Toutes</option>
      <option value="en">Anglais</option>
      <option value="fr">Français</option>
      <option value="es">Espagnol</option>
      <option value="de">Allemand</option>
      <option value="ja">Japonais</option>
      <option value="ko">Coréen</option>
      <option value="it">Italien</option>
    </select>
  </div>

  <div class="sidebar-section">
    <label>Index</label>
    <div class="sidebar-stat"><strong>movies_clean</strong></div>
    <div class="sidebar-stat" style="margin-top:0.5rem">4 802 documents indexés</div>
  </div>
</aside>

<main class="main">
  <h1>Movies <span>Search</span></h1>
  <p class="subtitle">Moteur de recherche connecté à Elasticsearch</p>

  <div class="search-wrapper">
    <span class="search-icon">🔍</span>
    <input type="text" id="query" placeholder="Rechercher un film par titre ou description..." />
  </div>

  <div class="meta" id="meta"></div>
  <div class="results" id="results">
    <div class="empty"><span>🎥</span>Tapez un titre pour lancer la recherche</div>
  </div>
</main>

<script>
  const ES = 'http://localhost:9200';
  const INDEX = 'movies_clean';

  let debounce;
  document.getElementById('query').addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(search, 300);
  });

  document.getElementById('query').addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });

  async function search() {
    const q = document.getElementById('query').value.trim();
    const genre = document.getElementById('genre').value;
    const lang = document.getElementById('language').value;
    const resultsEl = document.getElementById('results');
    const metaEl = document.getElementById('meta');

    resultsEl.innerHTML = '<div class="loading">Recherche en cours...</div>';
    metaEl.textContent = '';

    const must = q ? [{ multi_match: { query: q, fields: ['title^3', 'overview'], fuzziness: 'AUTO' } }] : [{ match_all: {} }];
    const filter = [];
    if (genre) filter.push({ term: { genres: genre } });
    if (lang) filter.push({ term: { original_language: lang } });

    try {
      const res = await fetch(`${ES}/${INDEX}/_search`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ size: 20, query: { bool: { must, filter } } })
      });

      const data = await res.json();
      const hits = data.hits.hits;
      const total = data.hits.total.value;

      metaEl.innerHTML = `<strong>${total}</strong> résultat${total > 1 ? 's' : ''} trouvé${total > 1 ? 's' : ''}`;

      if (!hits.length) {
        resultsEl.innerHTML = '<div class="empty"><span>🔎</span>Aucun résultat trouvé</div>';
        return;
      }

      resultsEl.innerHTML = hits.map(h => {
        const s = h._source;
        const year = s.release_date ? s.release_date.substring(0, 4) : '—';
        const genres = Array.isArray(s.genres) ? s.genres.slice(0, 3).map(g => `<span class="badge">${g}</span>`).join(' ') : '';
        const score = s.vote_average ? `⭐ ${parseFloat(s.vote_average).toFixed(1)}` : '—';
        const runtime = s.runtime ? `${s.runtime} min` : '';
        return `
          <div class="card">
            <div class="card-title">${s.title || '—'}</div>
            <div class="card-score">${score}</div>
            <div class="card-meta">
              <span>${year}</span>
              ${runtime ? `<span>${runtime}</span>` : ''}
              <span>${(s.original_language || '').toUpperCase()}</span>
              <span>${genres}</span>
            </div>
            ${s.overview ? `<div class="card-overview">${s.overview}</div>` : ''}
          </div>`;
      }).join('');

    } catch (err) {
      resultsEl.innerHTML = '<div class="empty"><span>⚠️</span>Erreur de connexion à Elasticsearch<br><small>Vérifiez que la stack tourne sur localhost:9200</small></div>';
    }
  }
</script>
</body>
</html>
